# Ελάχιστο redis.conf για το IpLookupApi cache layer.
# Τα maxmemory/eviction είναι server-side ρυθμίσεις - δεν μπαίνουν πουθενά στον .NET client.

# Hard limit μνήμης. Όταν το Redis φτάσει εδώ, αρχίζει να εφαρμόζει την maxmemory-policy
# αντί να επιστρέφει OOM errors στους writes.
maxmemory 512mb

# allkeys-lru: όταν γεμίσει η μνήμη, διώχνει το least-recently-used key από ΟΛΟ το keyspace
# (ανεξάρτητα αν έχει TTL ή όχι). Ταιριάζει σε καθαρό cache use-case όπως το δικό μας
# (IP -> country lookups), όπου δεν μας νοιάζει ποιο key θα χαθεί, αρκεί να μείνουν
# τα πιο "ζεστά".
#
# Εναλλακτικά: "volatile-lru" διώχνει LRU μόνο ανάμεσα σε keys που έχουν TTL.
# Στην περίπτωσή μας όλα τα keys μπαίνουν με TTL 24h (βλ. CacheService/IpLookupService),
# οπότε στην πράξη δεν αλλάζει κάτι - το allkeys-lru είναι απλά πιο "ασφαλές" default
# αν στο μέλλον προστεθεί key χωρίς TTL.
maxmemory-policy allkeys-lru

# Πόσα samples εξετάζει ο approximate-LRU αλγόριθμος πριν διαλέξει ποιο key θα διώξει.
# Default είναι 5. Ανεβάζοντάς το πλησιάζεις πιο πολύ σε "true" LRU, με μικρό CPU κόστος.
maxmemory-samples 10

# Snapshotting απενεργοποιημένο - το Redis εδώ είναι καθαρό cache (κάθε μη-cached
# τιμή ανακτάται ξανά από τη DB/IP2C), οπότε δεν χρειαζόμαστε persistence to disk.
save ""

# Δίκτυο
bind 0.0.0.0
protected-mode no
